:root{
  --orange:#EB7222;
  --navy:#00365C;
  --navy-deep:#002B49;
  --line:rgba(255,255,255,.14);
  --muted:#9FB6C9;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Open Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-weight:400;
  color:#EAF1F7;
  background:
    radial-gradient(1100px 700px at 78% -10%, rgba(235,114,34,.16), transparent 60%),
    radial-gradient(900px 600px at 8% 110%, rgba(0,90,150,.32), transparent 55%),
    linear-gradient(160deg,#012a47 0%,#00365C 48%,#002338 100%);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:28px;
}
.gate{
  width:100%;max-width:440px;
  background:rgba(2,28,48,.55);
  border:1px solid var(--line);
  border-radius:16px;
  padding:44px 40px 36px;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 30px 80px rgba(0,0,0,.45);
}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:30px}
.mark{width:13px;height:30px;border-radius:3px;background:var(--orange);box-shadow:0 0 22px rgba(235,114,34,.55)}
.brand .name{font-weight:700;letter-spacing:.16em;font-size:13px;text-transform:uppercase}
.brand .name span{color:var(--orange)}
.eyebrow{font-weight:600;text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:var(--orange);margin-bottom:12px}
h1{font-weight:700;font-size:23px;line-height:1.25;margin-bottom:10px}
p.sub{color:var(--muted);font-size:14px;line-height:1.55;margin-bottom:26px}
label{display:block;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.field{display:flex;gap:10px}
input{
  flex:1;width:100%;
  background:rgba(255,255,255,.06);
  border:1px solid var(--line);
  border-radius:9px;
  color:#fff;font-size:15px;font-family:inherit;
  padding:13px 14px;outline:none;transition:border-color .15s,background .15s;
}
input:focus{border-color:var(--orange);background:rgba(255,255,255,.09)}
button{
  border:0;border-radius:9px;cursor:pointer;
  background:var(--orange);color:#1a1206;
  font-family:inherit;font-weight:700;font-size:14px;letter-spacing:.02em;
  padding:0 20px;transition:filter .15s,transform .05s;
  white-space:nowrap;
}
button:hover{filter:brightness(1.07)}
button:active{transform:translateY(1px)}
button:disabled{opacity:.6;cursor:default}
.err{min-height:18px;margin-top:13px;font-size:13px;color:#FF9B7A}
.foot{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);line-height:1.5}
.foot b{color:#C3D4E2;font-weight:600}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(26,18,6,.35);border-top-color:#1a1206;border-radius:50%;animation:s .6s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes s{to{transform:rotate(360deg)}}
#frame{position:fixed;inset:0;width:100%;height:100%;border:0;display:none;background:#fff}
</style>
</head>
<body>
<div class="gate" id="gate">
  <div class="brand"><span class="mark"></span><span class="name">ADB <span>SAFEGATE</span></span></div>
  <div class="eyebrow">Cortex Campaign</div>
  <h1>Campaign System Handover</h1>
  <p class="sub">This handover is protected. Enter the access password you were sent to view the campaign system.</p>
  <label for="pw">Access password</label>
  <div class="field">
    <input id="pw" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Enter password">
    <button id="go">Unlock</button>
  </div>
  <div class="err" id="err"></div>
  <div class="foot">Prepared by <b>Pivitt</b> for ADB&nbsp;SAFEGATE. Contents are confidential and not for distribution.</div>
</div>
<iframe id="frame" title="Cortex Campaign System"></iframe>

<script>
const $ = s => document.querySelector(s);
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
let cfg = null;

async function load(){
  const r = await fetch('cortex.enc', {cache:'no-store'});
  cfg = await r.json();
}
const ready = load();

async function unlock(){
  const pw = $('#pw').value;
  if(!pw){ return; }
  const btn = $('#go'), err = $('#err');
  err.textContent=''; btn.disabled=true; btn.innerHTML='<span class="spin"></span>Unlocking';
  try{
    await ready;
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b64(cfg.salt), iterations:cfg.iter, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(cfg.iv)}, key, b64(cfg.ct));
    const htmlText = new TextDecoder().decode(plain);
    const url = URL.createObjectURL(new Blob([htmlText], {type:'text/html'}));
    const f = $('#frame');
    f.src = url; f.style.display='block';
    $('#gate').style.display='none';
    document.title = 'Cortex Campaign System · ADB SAFEGATE';
  }catch(e){
    btn.disabled=false; btn.textContent='Unlock';
    err.textContent='Incorrect password. Please check and try again.';
    $('#pw').select();
  }
}
$('#go').addEventListener('click', unlock);
$('#pw').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });
$('#pw').focus();
</script>
</body>
</html>
