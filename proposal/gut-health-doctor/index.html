<title>Private proposal · Pivitt</title>

<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060C;--panel:rgba(255,255,255,0.03);--line:rgba(255,255,255,0.1);--ink:#EDEEF2;--ink-2:#A7AAB4;--ink-3:#6C6F7A;--cyan:#06B6D4;--blue:#3366FF;--amber:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:'Inter Tight',-apple-system,sans-serif;font-weight:300;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:0.15;pointer-events:none}
.orb.a{width:460px;height:460px;background:var(--blue);top:-140px;right:-110px}
.orb.b{width:400px;height:400px;background:var(--cyan);bottom:-150px;left:-120px}
.gate{position:relative;z-index:2;width:100%;max-width:380px;padding:0 28px;text-align:center}
.eyebrow{font-weight:600;font-size:11px;letter-spacing:0.24em;text-transform:uppercase;color:var(--cyan);margin-bottom:20px}
h1{font-weight:300;font-size:26px;letter-spacing:-0.02em;line-height:1.15}
p.sub{margin-top:12px;font-size:13.5px;color:var(--ink-2);line-height:1.55}
form{margin-top:28px}
input{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;color:var(--ink);font-family:inherit;font-size:15px;font-weight:300;text-align:center;letter-spacing:0.04em}
input:focus{outline:none;border-color:var(--cyan)}
button{margin-top:12px;width:100%;background:var(--cyan);border:none;border-radius:12px;padding:14px;color:#04222a;font-family:inherit;font-size:14px;font-weight:500;letter-spacing:0.04em;cursor:pointer;transition:opacity .2s}
button:hover{opacity:0.9}
button:disabled{opacity:0.5;cursor:default}
.err{margin-top:14px;font-size:12.5px;color:var(--amber);min-height:18px;letter-spacing:0.02em}
.foot{margin-top:30px;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-3)}
.frame{position:fixed;inset:0;width:100%;height:100%;border:0;z-index:10;background:var(--bg)}
</style>
</head>
<body>
<div class="orb a"></div><div class="orb b"></div>
<div class="gate" id="gate">
  <div class="eyebrow">Private</div>
  <h1>This proposal is protected.</h1>
  <p class="sub">Enter the password you were sent to view it.</p>
  <form id="f" autocomplete="off">
    <input id="pw" type="password" placeholder="Password" autofocus aria-label="Password">
    <button id="go" type="submit">View proposal</button>
    <div class="err" id="err"></div>
  </form>
  <div class="foot">Pivitt</div>
</div>

async function unlock(pw){
