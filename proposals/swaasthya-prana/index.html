    @keyframes introLineExpand { to { width: 120px; } }
    .intro-brand {
      font-size: 13px; font-weight: 700; letter-spacing: 0.35em;
      color: rgba(255,255,255,0); display: flex; gap: 4px;

    .intro-brand span {

    .intro-divider {
      width: 24px; height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 20px 0;
      opacity: 0;
      animation: introFadeIn 0.6s ease 1.2s forwards;
    }
    .intro-prepared {
      font-size: 11px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0);
      text-transform: uppercase;
      animation: introFadeIn 0.6s ease 1.4s forwards;
    }
    .intro-client {
      font-size: 17px; font-weight: 500;
      color: rgba(255,255,255,0);
      letter-spacing: -0.01em; margin-top: 6px;
      animation: introFadeIn 0.6s ease 1.6s forwards;
    }
    @keyframes introFadeIn { to { color: rgba(255,255,255,0.45); opacity: 1; } }
    .intro-pulse {
      position: absolute; top: 50%; left: 50%;
      width: 200px; height: 200px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,165,116,0.06) 0%, transparent 70%);
      animation: introPulse 2.5s ease-in-out infinite;
    }
    @keyframes introPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }
    .intro-dots {
      position: absolute; inset: 0; overflow: hidden; opacity: 0.3;
    }
    .intro-dot {
      position: absolute; width: 1px; height: 1px;
      background: rgba(255,255,255,0.4); border-radius: 50%;
      animation: introDotFloat linear infinite;
    }
    @keyframes introDotFloat {

      90% { opacity: 1; }

  <script>
  (function() {
    var intro = document.getElementById('intro');
    var root = document.getElementById('root');
    root.style.display = 'none';
    var dotsContainer = document.getElementById('intro-dots');
    for (var i = 0; i < 30; i++) {
      var dot = document.createElement('div');
      dot.className = 'intro-dot';
      dot.style.left = Math.random() * 100 + '%';
      dot.style.bottom = '-2px';
      dot.style.animationDuration = (4 + Math.random() * 6) + 's';
      dot.style.animationDelay = (Math.random() * 3) + 's';
      dot.style.width = dot.style.height = (1 + Math.random() * 1.5) + 'px';
      dotsContainer.appendChild(dot);
    }
    var brand = document.getElementById('intro-brand');
    var letters = 'PIVITT'.split('');
    letters.forEach(function(letter, i) {
      var span = document.createElement('span');
      span.textContent = letter;
      span.style.animationDelay = (0.5 + i * 0.08) + 's';
      brand.appendChild(span);
    });
    setTimeout(function() {
      intro.classList.add('fade-out');
      root.style.display = '';
      setTimeout(function() { intro.style.display = 'none'; }, 800);
    }, 3200);
  })();

    const SPPresentation = () => {
      const [currentSlide, setCurrentSlide] = useState(0);
      const [isAnimating, setIsAnimating] = useState(false);
      const [isReady, setIsReady] = useState(false);
      const touchStartX = useRef(0);
      const touchStartY = useRef(0);
      const touchStartedInPannable = useRef(false);
      const slidesCountRef = useRef(0);
      const isMobile = useIsMobile();

      useEffect(() => {
        const t = setTimeout(() => setIsReady(true), 50);
        return () => clearTimeout(t);
      }, []);

      const goToSlide = useCallback((index) => {
        if (isAnimating || index === currentSlide || index < 0 || index >= slidesCountRef.current) return;
        setIsAnimating(true);
        setCurrentSlide(index);
        setTimeout(() => setIsAnimating(false), 600);
      }, [currentSlide, isAnimating]);

      const nextSlide = useCallback(() => goToSlide(currentSlide + 1), [currentSlide, goToSlide]);
      const prevSlide = useCallback(() => goToSlide(currentSlide - 1), [currentSlide, goToSlide]);

      useEffect(() => {
        const h = (e) => {
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); nextSlide(); }
          else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevSlide(); }
        };
        window.addEventListener('keydown', h);
        return () => window.removeEventListener('keydown', h);
      }, [nextSlide, prevSlide]);

      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
        touchStartedInPannable.current = !!e.target.closest('[data-pannable]');
      };
      const handleTouchEnd = (e) => {
        if (touchStartedInPannable.current) return;
        const diffX = touchStartX.current - e.changedTouches[0].clientX;
        const diffY = touchStartY.current - e.changedTouches[0].clientY;
        if (Math.abs(diffX) > 80 && Math.abs(diffX) > Math.abs(diffY) * 1.5) {
          diffX > 0 ? nextSlide() : prevSlide();
        }
      };

            <div style={{ position: 'absolute', width: '500px', height: '500px', borderRadius: '50%', filter: 'blur(140px)', opacity: 0.07, background: 'var(--purple)', bottom: '-200px', right: '-200px', animation: 'orbB 32s ease-in-out infinite' }} />
          </div>
          <div style={{ position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 1, opacity: 0.018, backgroundImage: "url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\")" }} />
        </>
      );

          minHeight: '100vh', width: '100vw',

          display: 'flex', flexDirection: 'column',
          justifyContent: isMobile ? 'flex-start' : 'center',
          alignItems: 'center', position: 'relative', overflow: 'visible', boxSizing: 'border-box',

            {children}
          </div>
          <div style={{
            position: 'absolute', bottom: isMobile ? '80px' : '24px', left: '50%', transform: 'translateX(-50%)',

          </div>
        </div>
      );

      const Label = ({ children, className = '', style = {} }) => (
        <div className={className} style={{
          fontSize: isMobile ? '10px' : '11px', color: 'var(--purple)', fontWeight: 600,
          letterSpacing: '0.12em', textTransform: 'uppercase',
          marginBottom: isMobile ? '12px' : '16px', textAlign: 'center', ...style,
        }}>{children}</div>
      );

      const Title = ({ children, className = '' }) => (
        <h2 className={className} style={{
          fontSize: isMobile ? 'clamp(24px, 7vw, 32px)' : 'clamp(30px, 4.5vw, 44px)',
          fontWeight: 300, letterSpacing: '-0.04em',

const TerritoryCanvas = ({
  kicker,
  title,
  subtitle,
  image,
  callouts = [],
  variant = 'default',
}) => {
  const isSmall = isMobile || (typeof window !== 'undefined' && (window.innerWidth < 820 || window.innerHeight < 720));

  const canvasStyle = {
    width: '100%',
    maxWidth: '1120px',
    borderRadius: isMobile ? '18px' : '26px',
    overflow: 'hidden',
    border: '1px solid rgba(255,255,255,0.10)',
    position: 'relative',
    boxShadow: '0 18px 70px rgba(0,0,0,0.55)',
    background: 'rgba(255,255,255,0.02)',
    minHeight: isMobile ? '520px' : '640px',
  };

  const bgStyle = {
    position: 'absolute',
    inset: 0,
    backgroundImage: `url(${image})`,
    backgroundSize: 'cover',
    backgroundPosition: 'center',
    transform: 'scale(1.02)',
    filter: 'saturate(1.02) contrast(1.05)',
  };

  const veilStyle = {
    position: 'absolute',
    inset: 0,
    background:
      'radial-gradient(900px 600px at 30% 18%, rgba(0,0,0,0.05), transparent 55%),' +
      'linear-gradient(180deg, rgba(0,0,0,0.12), rgba(0,0,0,0.56))',
  };

  const contentStyle = {
    position: 'relative',
    zIndex: 2,
    height: '100%',
    display: 'flex',
    flexDirection: 'column',
    justifyContent: 'space-between',
    padding: isMobile ? '18px' : '34px',
    gap: '16px',
  };

  const kickerStyle = {
    fontSize: '11px',
    letterSpacing: '0.18em',
    textTransform: 'uppercase',
    color: 'rgba(255,255,255,0.62)',
    fontWeight: 760,
    display: 'inline-flex',
    alignItems: 'center',
    gap: '10px',
    padding: '8px 12px',
    border: '1px solid rgba(255,255,255,0.12)',
    borderRadius: '999px',
    background: 'rgba(255,255,255,0.03)',
    backdropFilter: 'blur(14px)',
    WebkitBackdropFilter: 'blur(14px)',
    width: 'fit-content',
  };

  const dotStyle = {
    width: '7px',
    height: '7px',
    borderRadius: '50%',
    background: 'linear-gradient(135deg, rgba(212,165,116,1), rgba(124,154,114,1))',
    boxShadow: '0 0 0 6px rgba(212,165,116,0.10)',
    flexShrink: 0,
  };

  const titleStyle = {
    fontWeight: 260,
    letterSpacing: '-0.06em',
    lineHeight: 1.02,
    fontSize: isMobile ? '40px' : 'clamp(44px, 5.3vw, 66px)',
    color: 'rgba(255,255,255,0.94)',
    textShadow: '0 18px 70px rgba(0,0,0,0.55)',
    maxWidth: isMobile ? '18ch' : '14ch',
  };

  const subStyle = {
    marginTop: '10px',
    color: 'rgba(255,255,255,0.72)',
    fontSize: isMobile ? '14px' : '15px',
    lineHeight: 1.7,
    fontWeight: 360,
    maxWidth: isMobile ? '52ch' : '58ch',
    textShadow: '0 18px 70px rgba(0,0,0,0.50)',
  };

  const calloutBase = {
    borderRadius: '18px',
    border: '1px solid rgba(255,255,255,0.14)',
    background: 'rgba(6,6,12,0.34)',
    backdropFilter: 'blur(18px)',
    WebkitBackdropFilter: 'blur(18px)',
    padding: isMobile ? '12px 14px' : '14px 16px',
    boxShadow: '0 14px 60px rgba(0,0,0,0.40)',
  };

  const calloutH = {
    fontSize: '10px',
    letterSpacing: '0.18em',
    textTransform: 'uppercase',
    color: 'rgba(255,255,255,0.48)',
    fontWeight: 780,
  };

  const calloutP = {
    marginTop: '8px',
    fontSize: isMobile ? '12.5px' : '13px',
    lineHeight: 1.55,
    color: 'rgba(255,255,255,0.82)',
    fontWeight: 420,
  };

  const isStacked = isSmall;

  const calloutLayerStyle = {
    position: 'absolute',
    left: 0,
    right: 0,
    bottom: 0,
    /* Reserved safe-zone for headline and subhead. Prevents any copy-over-copy collisions. */
    top: isMobile ? '0px' : 'clamp(420px, 56%, 560px)',
    zIndex: 3,
    pointerEvents: 'none',
  };

  // Desktop overlays must never overlap each other. Instead of placing each callout absolutely
  // (which can collide on different aspect ratios), we place them into left/right stacks.
  // The original `pos` hints are used only to choose a side, not to set exact coordinates.
  const columns = React.useMemo(() => {
    const left = [];
    const right = [];

    (callouts || []).forEach((c, idx) => {
      const pos = c.pos || {};
      const leftVal = typeof pos.left === 'string' ? parseFloat(pos.left) : (typeof pos.left === 'number' ? pos.left : null);
      const isRight = Boolean(pos.right) || (leftVal !== null && leftVal > 52);
      (isRight ? right : left).push({ ...c, _i: idx });
    });

    return { left, right };
  }, [callouts]);

  const columnWrap = {
    position: 'absolute',
    top: 0,
    bottom: 0,
    left: 0,
    right: 0,
    pointerEvents: 'none',
  };

  const columnStyle = (side) => ({
    position: 'absolute',
    width: 'min(380px, 34vw)',
    display: 'flex',
    flexDirection: 'column',
    gap: '12px',
    pointerEvents: 'none',
    // Keep clear of the footer nav.
    bottom: '96px',
    ...(side === 'left'
      ? { left: 'clamp(18px, 3vw, 34px)' }
      : { right: 'clamp(18px, 3vw, 34px)' }),
  });

  return (
    <SlideWrapper>
      <div style={canvasStyle} className="animate-in delay-2">
        <div style={bgStyle} aria-hidden="true" />
        <div style={veilStyle} aria-hidden="true" />

        <div style={contentStyle}>
          <div>
            <div style={kickerStyle} className="animate-in delay-2">
              <span style={dotStyle} />
              {kicker}
            </div>
            <div style={{ marginTop: isMobile ? '18px' : '22px' }}>
              <div style={titleStyle} className="animate-in delay-3">{title}</div>
              {subtitle ? <div style={subStyle} className="animate-in delay-4">{subtitle}</div> : null}
            </div>
          </div>

          {callouts.length ? (
            <div style={{
              display: 'grid',
              gap: '12px',
              marginTop: '12px',
              maxWidth: isStacked ? '100%' : '0px',
            }}>
              {/* When stacked: keep callouts in flow to prevent collisions. When not: render absolute overlays. */}
              {isStacked ? (
                <div style={{ display: 'grid', gap: '10px' }} className="animate-in delay-5">
                  {callouts.map((c, i) => (
                    <div key={i} className="callout" style={{ ...calloutBase }}>
                      <div style={calloutH}>{c.h}</div>
                      <div style={calloutP}>{c.p}</div>
                    </div>
                  ))}
                </div>
              ) : null}
            </div>
          ) : (
            <div />
          )}
        </div>

        {/* Desktop overlays: system-led callouts in left/right stacks (never overlapping). */}
        {!isStacked && callouts.length ? (
          <div style={calloutLayerStyle}>
            <div style={columnWrap}>
              {columns.left.length ? (
                <div style={columnStyle('left')}>
                  {columns.left.map((c, idx) => (
                    <div
                      key={`l-${c._i}`}
                      className={`callout animate-in delay-${5 + Math.min(idx, 4)}`}
                      style={{ ...calloutBase, pointerEvents: 'auto' }}
                    >
                      <div style={calloutH}>{c.h}</div>
                      <div style={calloutP}>{c.p}</div>
                    </div>
                  ))}
                </div>
              ) : null}

              {columns.right.length ? (
                <div style={columnStyle('right')}>
                  {columns.right.map((c, idx) => (
                    <div
                      key={`r-${c._i}`}
                      className={`callout animate-in delay-${5 + Math.min(idx, 4)}`}
                      style={{ ...calloutBase, pointerEvents: 'auto' }}
                    >
                      <div style={calloutH}>{c.h}</div>
                      <div style={calloutP}>{c.p}</div>
                    </div>
                  ))}
                </div>
              ) : null}
            </div>
          </div>
        ) : null}
      </div>
    </SlideWrapper>
  );
};

      };

      // ─── RENDER ───
            const slides = useMemo(() => [
        <CoverSlide key="0" />,
        <WhatWeHeard key="1" />,
        <OpportunitySlide key="2" />,
        <ChallengeSlide key="3" />,
        <StrategyPathwaysSlide key="4" />,
        <InspirationSlide key="5" />,

        <SectionCoverSlide
          key="6"
          eyebrow="Strategic Exploration"
          title="Visual Territories"
          subtitle="A guided breakdown of how the Swaasthya Prana brand can visually express trust, vitality, and transformation, and how those principles translate into a scalable system."
          accentA="var(--gold)"
          accentB="var(--sage)"
        />,
        <VTContentsSlide key="7" />,
        <VT01Cover key="8a" />,
        <VT01Annotated key="8b" />,
        <VT01CraftZoom key="8c" />,
        <VT01ReferenceLibrary key="8d" />,
        <VT01Consistency key="8e" />,

        <VT02Cover key="9a" />,
        <VT02AnnotatedA key="9b" />,
        <VT02CraftZoom key="9c" />,
        <VT02Consistency key="9d" />,

        <VT03Cover key="10a" />,
        <VT03AnnotatedA key="10b" />,
        <VT03FlowLibrary key="10c" />,
        <VT03Consistency key="10d" />,

        <Model360Slide key="11" />,
        <RoadmapSlide key="12" />,

        <SectionCoverSlide
          key="12a"
          eyebrow="Next section"
          title="Brand Architecture"
          subtitle="Organising 130+ SKUs into a clear, scalable structure, before visual design execution."
          accentA="var(--gold)"
          accentB="var(--sage)"
        />,

        <ArchitectureSlide key="13" />,
        <SubBrandSlide key="14" />,
        <PackagingSlide key="15" />,
        <PositioningSlide key="16" />,

        <GanttSlide key="17" />,
        <InvestmentSlide key="18" />,

        <WhyPivittSlide key="19" />,
        <TestimonialsSlide key="20" />,
        <BeyondLaunchSlide key="21" />,

        <NextStepsSlide key="22" />,
        <ClosingSlide key="23" />,
      ], [isMobile]);

      useEffect(() => { slidesCountRef.current = slides.length; }, [slides]);

      if (!isReady) return <div style={{ height: '100vh', width: '100vw', background: 'var(--bg)' }} />;

      return (
        <div style={{ height: '100vh', width: '100vw', overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}
          onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>

          <Ambient />

          {/* ─── TOP HEADER BAR ─── */}
          <div className="no-print" style={{
            position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
            padding: isMobile ? '12px 14px' : '14px 14px',
            display: 'flex', justifyContent: 'center',
            pointerEvents: 'none',
          }}>
            <div style={{
              width: 'min(1120px, 96vw)',
              display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              gap: '12px',
              padding: isMobile ? '10px 12px' : '10px 14px',
              borderRadius: '999px',
              border: '1px solid rgba(255,255,255,0.10)',
              background: 'rgba(6,6,12,0.62)',
              backdropFilter: 'blur(18px) saturate(1.4)', WebkitBackdropFilter: 'blur(18px) saturate(1.4)',
              boxShadow: '0 10px 40px rgba(0,0,0,0.30)',
              pointerEvents: 'auto',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px', minWidth: 0 }}>
                <div style={{
                  fontSize: '11px', fontWeight: 800, letterSpacing: '0.24em', textTransform: 'uppercase',
                  color: 'rgba(255,255,255,0.55)', whiteSpace: 'nowrap',
                }}>
                  <span style={{ color: 'rgba(255,255,255,0.88)' }}>PIVITT</span>
                </div>
                <div style={{ width: '1px', height: '14px', background: 'rgba(255,255,255,0.10)' }} />
                <div style={{
                  fontSize: '10px', fontWeight: 650, letterSpacing: '0.18em', textTransform: 'uppercase',
                  color: 'rgba(255,255,255,0.35)',
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
                }}>
                  Swaasthya Prana · Brand Transformation Programme
                </div>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: '10px', flex: '0 0 auto' }}>
                <div style={{
                  fontSize: '10px', color: 'rgba(255,255,255,0.35)',
                  border: '1px solid rgba(255,255,255,0.10)',
                  background: 'rgba(255,255,255,0.02)',
                  padding: '6px 10px',
                  borderRadius: '999px',
                  letterSpacing: '0.08em',
                }}>
                  {currentSlide + 1}/{slides.length}
                </div>
              </div>
            </div>
          </div>

          <div style={{ height: '100%', width: '100%', position: 'relative' }}>
            {slides.map((slide, index) => (
              <div key={index} style={{
                position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
                opacity: currentSlide === index ? 1 : 0,
                transform: currentSlide === index ? 'scale(1)' : 'scale(0.98)',
                transition: 'opacity 0.5s ease, transform 0.5s ease',
                pointerEvents: currentSlide === index ? 'auto' : 'none',
                overflowX: 'hidden', overflowY: 'auto', WebkitOverflowScrolling: 'touch',
              }}>
                {slide}
              </div>
            ))}
          </div>

          <div className="no-print bottom-nav" style={{
            position: 'fixed', 
            bottom: isMobile ? '24px' : '28px', 
            left: '50%', transform: 'translateX(-50%)',
            display: 'flex', alignItems: 'center', gap: isMobile ? '10px' : '16px',
            padding: isMobile ? '10px 16px' : '14px 28px',
            borderRadius: '20px',
            border: '1px solid rgba(255,255,255,0.1)',
            background: 'rgba(6,6,12,0.75)',
            backdropFilter: 'blur(32px) saturate(1.6)', WebkitBackdropFilter: 'blur(32px) saturate(1.6)',
            zIndex: 1000,
          }}>
            <button style={{
              width: isMobile ? '32px' : '38px', height: isMobile ? '32px' : '38px', borderRadius: '50%',
              border: '1px solid var(--bdr)', background: 'var(--card)', color: '#fff',
              cursor: currentSlide === 0 ? 'not-allowed' : 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: isMobile ? '12px' : '14px', opacity: currentSlide === 0 ? 0.3 : 1,
              transition: 'all 0.2s', fontFamily: 'inherit',
            }} onClick={prevSlide} disabled={currentSlide === 0}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{width:'14px',height:'14px'}}><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>

            <div
              style={{
                position: 'relative',
                display: 'flex',
                maxWidth: isMobile ? '160px' : 'unset',
                overflow: isMobile ? 'hidden' : 'visible',
                padding: isMobile ? '2px 2px' : 0,
                WebkitMaskImage: isMobile
                  ? 'linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%)'
                  : 'none',
                maskImage: isMobile
                  ? 'linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%)'
                  : 'none',
              }}
            >
              {(() => {
                // Mobile: show a moving window of dots so pagination never hits the screen edge.
                const maxDots = isMobile ? 9 : slides.length;
                const half = Math.floor(maxDots / 2);
                const start = isMobile
                  ? Math.max(0, Math.min(currentSlide - half, slides.length - maxDots))
                  : 0;
                const end = isMobile ? Math.min(slides.length, start + maxDots) : slides.length;
                const indices = [];
                for (let i = start; i < end; i++) indices.push(i);

                // Optional "more" hints at edges (subtle, still clickable).
                const showLeftMore = isMobile && start > 0;
                const showRightMore = isMobile && end < slides.length;

                return (
                  <div style={{ display: 'flex', gap: isMobile ? '3px' : '5px', alignItems: 'center' }}>
                    {showLeftMore ? (
                      <div
                        key="more-left"
                        title="Earlier slides"
                        style={{
                          width: '5px',
                          height: '5px',
                          borderRadius: '3px',
                          background: 'rgba(255,255,255,0.10)',
                          cursor: 'pointer',
                          transition: 'all 0.3s',
                        }}
                        onClick={() => goToSlide(Math.max(0, start - half))}
                      />
                    ) : null}

                    {indices.map((i) => (
                      <div
                        key={i}
                        style={{
                          width: currentSlide === i ? (isMobile ? '14px' : '20px') : (isMobile ? '5px' : '6px'),
                          height: isMobile ? '5px' : '6px',
                          borderRadius: '3px',
                          background:
                            currentSlide === i
                              ? 'linear-gradient(135deg, var(--blue), var(--purple))'
                              : 'rgba(255,255,255,0.15)',
                          cursor: 'pointer',
                          transition: 'all 0.3s',
                        }}
                        onClick={() => goToSlide(i)}
                      />
                    ))}

                    {showRightMore ? (
                      <div
                        key="more-right"
                        title="Later slides"
                        style={{
                          width: '5px',
                          height: '5px',
                          borderRadius: '3px',
                          background: 'rgba(255,255,255,0.10)',
                          cursor: 'pointer',
                          transition: 'all 0.3s',
                        }}
                        onClick={() => goToSlide(Math.min(slides.length - 1, end + half - 1))}
                      />
                    ) : null}
                  </div>
                );
              })()}
            </div>

            <span style={{ fontSize: isMobile ? '10px' : '11px', color: 'var(--t3)', minWidth: isMobile ? '36px' : '44px', textAlign: 'center' }}>
              {currentSlide + 1}/{slides.length}
            </span>

            <button style={{
              width: isMobile ? '32px' : '38px', height: isMobile ? '32px' : '38px', borderRadius: '50%',
              border: '1px solid var(--bdr)', background: 'var(--card)', color: '#fff',
              cursor: currentSlide === (slides.length - 1) ? 'not-allowed' : 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: isMobile ? '12px' : '14px', opacity: currentSlide === (slides.length - 1) ? 0.3 : 1,
              transition: 'all 0.2s', fontFamily: 'inherit',
            }} onClick={nextSlide} disabled={currentSlide === (slides.length - 1)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{width:'14px',height:'14px'}}><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
          </div>
        </div>
      );
    };

    ReactDOM.render(<SPPresentation />, document.getElementById('root'));
  </script>
</body>
</html>
