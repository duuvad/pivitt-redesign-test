<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Berkeley Partnership &middot; Pivitt 360 Brand Diagnostic</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    :root {
      --bg:    #06060C;
      --t1:    #ffffff;
      --t2:    rgba(255,255,255,0.65);
      --t3:    rgba(255,255,255,0.38);
      --t4:    rgba(255,255,255,0.18);
      --acc:   #06B6D4;
      --bdr:   rgba(255,255,255,0.08);
      --bdrH:  rgba(255,255,255,0.15);
      --card:  rgba(8,8,18,0.55);
      --r:     12px;
      --ease:  cubic-bezier(0.4,0,0.2,1);
      /* nav height reserved */
      --nav-h: 80px;
      --top-h: 64px;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body, #root { height:100%; overflow:hidden; }
    body {
      font-family:'Inter Tight', system-ui, sans-serif;
      background:var(--bg);
      color:var(--t1);
      -webkit-font-smoothing:antialiased;
    }
    ::selection { background:rgba(6,182,212,0.22); }
    ::-webkit-scrollbar { width:2px; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.10); border-radius:2px; }

    /* Intro splash */
    #intro {
      position:fixed; inset:0; z-index:99999;
      display:flex; align-items:center; justify-content:center;
      background:var(--bg);
      transition:opacity 0.9s var(--ease);
    }
    #intro.out { opacity:0; pointer-events:none; }
    .i-dots { position:absolute; inset:0; overflow:hidden; opacity:0.22; pointer-events:none; }
    .i-dot { position:absolute; border-radius:50%; background:rgba(255,255,255,0.5); animation:dotFloat linear infinite; }
    @keyframes dotFloat {
      0%   { opacity:0; transform:translateY(0) scale(1); }
      10%  { opacity:1; }
      90%  { opacity:1; }
      100% { opacity:0; transform:translateY(-100vh) scale(0.4); }
    }
    .i-glow {
      position:absolute; top:50%; left:50%;
      width:280px; height:280px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
      animation:glowPulse 3s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes glowPulse {
      0%,100% { transform:translate(-50%,-50%) scale(1); opacity:0.6; }
      50%     { transform:translate(-50%,-50%) scale(1.25); opacity:1; }
    }
    .i-body { position:relative; z-index:2; text-align:center; display:flex; flex-direction:column; align-items:center; }
    .i-line {
      width:0; height:1px;
      background:linear-gradient(90deg, transparent, rgba(6,182,212,0.55), rgba(59,130,246,0.30), transparent);
      margin-bottom:36px;
      animation:lineGrow 1.1s var(--ease) 0.4s forwards;
    }
    @keyframes lineGrow { to { width:100px; } }
    .i-brand { font-size:12px; font-weight:700; letter-spacing:0.36em; display:flex; gap:3px; }
    .i-brand span { opacity:0; transform:translateY(8px); animation:letterIn 0.35s var(--ease) forwards; }
    @keyframes letterIn { to { opacity:1; transform:translateY(0); color:rgba(255,255,255,0.90); } }
    .i-div { width:20px; height:1px; background:rgba(255,255,255,0.10); margin:22px auto; opacity:0; animation:fadeIn 0.5s ease 1.3s forwards; }
    @keyframes fadeIn { to { opacity:1; } }
    .i-prep { font-size:10px; letter-spacing:0.10em; text-transform:uppercase; color:rgba(255,255,255,0); animation:fadeInMuted 0.6s ease 1.5s forwards; }
    .i-client { font-size:17px; font-weight:400; color:rgba(255,255,255,0); letter-spacing:-0.01em; margin-top:6px; animation:fadeInMuted 0.6s ease 1.7s forwards; }
    @keyframes fadeInMuted { to { color:rgba(255,255,255,0.42); } }

    /* Keyframes */
    @keyframes fadeInUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideUp  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes floatY   { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-7px); } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    @keyframes orbDrift { 0%,100% { transform:translate(0,0); } 50% { transform:translate(80px,60px); } }
    @keyframes orbDrift2{ 0%,100% { transform:translate(0,0); } 50% { transform:translate(-70px,-50px); } }

    .anim { animation:slideUp 0.65s cubic-bezier(0.16,1,0.3,1) both; }
    .d1 { animation-delay:0.08s; }
    .d2 { animation-delay:0.16s; }
    .d3 { animation-delay:0.24s; }
    .d4 { animation-delay:0.32s; }
    .d5 { animation-delay:0.40s; }
    .d6 { animation-delay:0.48s; }
    .d7 { animation-delay:0.56s; }
  </style>
</head>
<body>

  <!-- Password Gate -->
  <div id="gate" style="position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;background:#06060C;font-family:'Inter Tight',sans-serif;">
    <div style="text-align:center;padding:40px;max-width:380px;width:100%;">
      <div style="width:1px;height:48px;background:linear-gradient(180deg,transparent,rgba(6,182,212,0.40),transparent);margin:0 auto 32px;"></div>
      <div style="font-size:11px;font-weight:700;letter-spacing:0.30em;text-transform:uppercase;color:rgba(255,255,255,0.85);margin-bottom:8px;">PIVITT</div>
      <div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.30);margin-bottom:36px;">Prepared for The Berkeley Partnership</div>
      <div style="position:relative;margin-bottom:12px;">
        <input id="pw-input" type="password" placeholder="Enter access code" autocomplete="off"
          style="width:100%;padding:13px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);border-radius:8px;color:#fff;font-family:'Inter Tight',sans-serif;font-size:14px;outline:none;letter-spacing:0.04em;transition:border-color 0.2s;"
          onkeydown="if(event.key==='Enter')checkPW();"
          onfocus="this.style.borderColor='rgba(6,182,212,0.35)'"
          onblur="this.style.borderColor='rgba(255,255,255,0.10)'"
        />
      </div>
      <div id="pw-err" style="font-size:11px;color:rgba(239,68,68,0.75);margin-bottom:12px;height:16px;"></div>
      <button onclick="checkPW()" style="width:100%;padding:12px;background:rgba(6,182,212,0.10);border:1px solid rgba(6,182,212,0.28);border-radius:8px;color:#06B6D4;font-family:'Inter Tight',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;"
        onmouseover="this.style.background='rgba(6,182,212,0.18)'"
        onmouseout="this.style.background='rgba(6,182,212,0.10)'">
        Access Document
      </button>
    </div>
  </div>
  <script>
    (function(){
      var key = 'bk_access_2026';
      if (localStorage.getItem(key) === '1') {
        document.getElementById('gate').style.display = 'none';
        return;
      }
      document.getElementById('intro').style.display = 'none';
      document.getElementById('root').style.display = 'none';
    })();
    function checkPW() {
      var val = document.getElementById('pw-input').value;
      if (val === 'Berkeley2026') {
        localStorage.setItem('bk_access_2026', '1');
        document.getElementById('gate').style.display = 'none';
        document.getElementById('intro').style.display = '';
        // Re-trigger the intro animation after gate closes
        setTimeout(function(){
          var root = document.getElementById('root');
          root.style.display = 'none';
          var dots = document.getElementById('i-dots');
          if (dots.children.length === 0) {
            for (var i = 0; i < 28; i++) {
              var d = document.createElement('div');
              d.className = 'i-dot';
              d.style.cssText = 'left:'+Math.random()*100+'%;bottom:-2px;width:'+(1+Math.random()*1.5)+'px;height:'+(1+Math.random()*1.5)+'px;animation-duration:'+(5+Math.random()*6)+'s;animation-delay:'+(Math.random()*3)+'s;';
              dots.appendChild(d);
            }
          }
          var brand = document.getElementById('i-brand');
          if (brand.children.length === 0) {
            'PIVITT'.split('').forEach(function(ch, i){
              var s = document.createElement('span');
              s.textContent = ch;
              brand.appendChild(s);
            });
          }
          // Force reflow then trigger animation
          brand.offsetHeight;
          Array.from(brand.children).forEach(function(s, i){
            s.style.animationDelay = (0.5 + i * 0.08) + 's';
            setTimeout(function(){ s.classList.add('go'); }, 10);
          });
          setTimeout(function(){
            var intro = document.getElementById('intro');
            intro.classList.add('out');
            root.style.display = '';
            setTimeout(function(){ intro.style.display = 'none'; }, 900);
          }, 3200);
        }, 50);
      } else {
        var err = document.getElementById('pw-err');
        err.textContent = 'Incorrect access code';
        var inp = document.getElementById('pw-input');
        inp.style.borderColor = 'rgba(239,68,68,0.40)';
        setTimeout(function(){ inp.style.borderColor='rgba(255,255,255,0.10)'; err.textContent=''; }, 2500);
      }
    }
  </script>

  <div id="intro">
    <div class="i-dots" id="i-dots"></div>
    <div class="i-glow"></div>
    <div class="i-body">
      <div class="i-line"></div>
      <div class="i-brand" id="i-brand"></div>
      <div class="i-div"></div>
      <div class="i-prep">Prepared exclusively for</div>
      <div class="i-client">The Berkeley Partnership</div>
    </div>
  </div>

  <div id="root"></div>

  <script>
    (function(){
      // Only run if password has already been entered
      if (localStorage.getItem('bk_access_2026') !== '1') return;
      var intro = document.getElementById('intro');
      var root  = document.getElementById('root');
      root.style.display = 'none';

      var dc = document.getElementById('i-dots');
      for (var i = 0; i < 28; i++) {
        var d = document.createElement('div');
        d.className = 'i-dot';
        d.style.cssText = 'left:'+Math.random()*100+'%;bottom:-2px;width:'+(1+Math.random()*1.5)+'px;height:'+(1+Math.random()*1.5)+'px;animation-duration:'+(5+Math.random()*6)+'s;animation-delay:'+(Math.random()*3)+'s;';
        dc.appendChild(d);
      }

      var brand = document.getElementById('i-brand');
      'PIVITT'.split('').forEach(function(ch, i){
        var s = document.createElement('span');
        s.textContent = ch;
        brand.appendChild(s);
      });
      brand.offsetHeight;
      Array.from(brand.children).forEach(function(s, i){
        s.style.animationDelay = (0.5 + i * 0.08) + 's';
        setTimeout(function(){ s.classList.add('go'); }, 10);
      });

      setTimeout(function(){
        intro.classList.add('out');
        root.style.display = '';
        setTimeout(function(){ intro.style.display = 'none'; }, 900);
      }, 3200);
    })();
  </script>

  <script type="text/babel">

        window.addEventListener('resize', h);
        return () => window.removeEventListener('resize', h);
      }, []);

    /* ─────────────── SHARED COMPONENTS ─────────────── */

    /* Glass card: primary surface */
    const Card = ({ children, style={}, className='', highlight=false }) => (
      <div className={className} style={{
        borderRadius: '12px',
        border: `1px solid ${highlight ? 'rgba(6,182,212,0.22)' : 'rgba(255,255,255,0.08)'}`,
        background: 'rgba(8,8,18,0.55)',
        backdropFilter: 'blur(24px) saturate(1.3)',

        boxShadow: '0 8px 48px rgba(0,0,0,0.36)',
        ...style,
      }}>{children}</div>
    );

    /* Eyebrow label: uses accent colour matching PDF .ey class */
    const Eyebrow = ({ children, style={} }) => (
      <div style={{
        fontSize:'9px', fontWeight:600, letterSpacing:'0.18em',
        textTransform:'uppercase', color:'#06B6D4',
        marginBottom:'6px', ...style,

    /* Section header: white, no colour */

        h += `<radialGradient id="cg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#06B6D4" stop-opacity="0.18"/><stop offset="70%" stop-color="#3B82F6" stop-opacity="0.05"/><stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/></radialGradient></defs>`;
        h += `<circle cx="${CX}" cy="${CY}" r="${RO+18}" fill="url(#cg)" filter="url(#cf)" opacity="0.45"/>`;
        [RI,RM,RO].forEach((r,i) => { h += `<circle cx="${CX}" cy="${CY}" r="${r}" fill="none" stroke="rgba(${i===0?'6,182,212':i===1?'59,130,246':'139,92,246'},0.06)" stroke-width="0.5" filter="url(#rf)"/>`; });
        h += `<circle cx="${CX}" cy="${CY}" r="${RE}" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>`;

        // Stage arcs
        [{l:'FOUNDATION',s:0,e:240,c:'#06B6D4'},{l:'BUILD',s:240,e:360,c:'#8B5CF6'}].forEach((sa,i) => {
          h += `<path d="${arc(RE,sa.s,sa.e)}" fill="none" stroke="${sa.c}" stroke-width="16" opacity="0.07" id="sa-${i}"/>`;
          h += `<text font-family="'Inter Tight'" font-size="6" letter-spacing="0.07em" font-weight="600" fill="${sa.c}" opacity="0.40"><textPath href="#sa-${i}" startOffset="50%" text-anchor="middle">${sa.l}</textPath></text>`;
        });

        const segA = 60;
        PILLARS.forEach((p, i) => {
          const sA=i*segA, eA=(i+1)*segA, mA=sA+segA/2;
          const isA = activePillar===i;
          h += `<path d="${seg(RC+6,RM,sA,eA)}" fill="${isA?p.color+'18':p.color+'07'}" stroke="${isA?p.color+'55':p.color+'25'}" stroke-width="${isA?'1.2':'0.5'}" style="cursor:pointer;transition:all 0.28s" data-p="${i}"/>`;

          p.subs.forEach((sub, si) => {
            const ss=sA+(segA/p.subs.length)*si, se=sA+(segA/p.subs.length)*(si+1);
            h += `<path d="${seg(RM+1,RO,ss,se)}" fill="${isA?p.color+'0C':p.color+'03'}" stroke="${isA?p.color+'28':p.color+'12'}" stroke-width="0.3" style="cursor:pointer;transition:all 0.28s" data-p="${i}" data-s="${si}"/>`;
            const lp=pt((RM+RO)/2,(ss+se)/2), rr=((ss+se)/2>90&&(ss+se)/2<270)?(ss+se)/2+180:(ss+se)/2;
            const maxL=Math.max(8,Math.round(15*(segA/p.subs.length)/60));
            const sn=sub.name.length>maxL?sub.name.substring(0,maxL-1)+'\u2026':sub.name;
            h += `<text font-family="'Inter Tight'" font-size="5.5" font-weight="400" fill="${isA?'rgba(255,255,255,0.50)':'rgba(255,255,255,0.18)'}" text-anchor="middle" transform="rotate(${rr-90},${lp.x},${lp.y})" style="pointer-events:none;transition:fill 0.28s" x="${lp.x}" y="${lp.y}">${sn}</text>`;
          });

          const lp=pt((RC+6+RM)/2, mA);
          const nm=p.name.split(' ');
          h += `<text font-family="'Inter Tight'" font-size="9" font-weight="600" fill="${isA?'#fff':'rgba(255,255,255,0.48)'}" text-anchor="middle" style="pointer-events:none;transition:fill 0.28s" x="${lp.x}" y="${lp.y-(nm.length>2?6:nm.length>1?4:0)}">`;
          if(nm.length<=2){h+=nm.join(' ');}else{h+=`<tspan x="${lp.x}" dy="0">${nm.slice(0,-1).join(' ')}</tspan><tspan x="${lp.x}" dy="11">${nm[nm.length-1]}</tspan>`;}
          h += `</text>`;

          const dp=pt(RC+9,mA);
          h += `<circle cx="${dp.x}" cy="${dp.y}" r="3.5" fill="${p.color}" opacity="${isA?'1':'0.65'}" filter="url(#gf-${p.id})" style="cursor:pointer;transition:all 0.28s" data-p="${i}"/>`;

          const ls=pt(RC+6,sA), le=pt(RO,sA);
          h += `<line x1="${ls.x}" y1="${ls.y}" x2="${le.x}" y2="${le.y}" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>`;
        });

        h += `<circle cx="${CX}" cy="${CY}" r="${RC+4}" fill="#06B6D4" opacity="0.04" filter="url(#cf)"/>`;
        h += `<circle cx="${CX}" cy="${CY}" r="${RC}" fill="rgba(6,182,212,0.07)" stroke="rgba(6,182,212,0.22)" stroke-width="0.8" style="cursor:pointer" data-centre="1"/>`;
        const ct = activePillar!==null ? PILLARS[activePillar].name : 'BK 360';
        const cc = activePillar!==null ? PILLARS[activePillar].color : '#fff';
        h += `<text x="${CX}" y="${CY-3}" font-family="'Inter Tight'" font-size="9" font-weight="700" fill="${cc}" text-anchor="middle" style="pointer-events:none">${ct.length>14?ct.substring(0,12)+'\u2026':ct}</text>`;
        h += `<text x="${CX}" y="${CY+9}" font-family="'Inter Tight'" font-size="6" fill="rgba(255,255,255,0.35)" text-anchor="middle" style="pointer-events:none">${activePillar!==null?PILLARS[activePillar].subs.length+' components':'Select to explore'}</text>`;
        svgRef.current.innerHTML = h;
      }, [activePillar, m]);

      const handleClick = useCallback((e) => {
        const el = e.target.closest('[data-p]');
        const centre = e.target.closest('[data-centre]');
        if (centre) { deselect(); return; }
        if (el) { select(parseInt(el.dataset.p)); }
      }, []);

      const ap = activePillar!==null ? PILLARS[activePillar] : null;
      const totalP = ap ? ap.subs.reduce((a,s) => a+s.items.length, 0) : 0;

      return (
        <Slide>
          <Eyebrow className="anim d1">The Pivitt 360 Brand Model</Eyebrow>
          <h2 className="anim d2" style={{ fontSize: m?'clamp(26px,8vw,36px)':'clamp(28px,4vw,40px)', fontWeight:250, letterSpacing:'-0.04em', lineHeight:1.06, color:'#fff', marginBottom:'10px' }}>
            Applied to<br/>The Berkeley Partnership.
          </h2>
          <p className="anim d3" style={{ fontSize: m?'12px':'13.5px', color:'rgba(255,255,255,0.50)', lineHeight:1.68, fontWeight:300, maxWidth:'560px', marginBottom:'24px' }}>
            Six pillars. {total} deliverables. Select each area to see Pivitt's assessment of Berkeley's current alignment and the full scope of the transformation.
          </p>

          {/* Overall card */}
          <Card className="anim d3" highlight style={{ padding: m?'14px 16px':'18px 24px', marginBottom:'20px', width:'100%', maxWidth:'560px' }}>
            <Eyebrow>Overall Assessment</Eyebrow>
            <div style={{ fontSize: m?'15px':'17px', fontWeight:400, color:'#fff', letterSpacing:'-0.02em', marginBottom:'6px' }}>
              Strong credentials. Brand system not yet built to carry them.
            </div>
            <div style={{ fontSize:'11px', color:'rgba(255,255,255,0.50)', lineHeight:1.60, fontWeight:300 }}>
              Exceptional track record, genuine differentiator, FT-recognised quality. Brand infrastructure not yet constructed to make those visible to a new prospect.
            </div>
          </Card>

          {/* SVG wheel (desktop) */}
          {!m && (
            <div className="anim d4" style={{ display:'flex', justifyContent:'center', marginBottom:'24px', width:'100%' }}>
              <svg ref={svgRef} viewBox="0 0 500 500" onClick={handleClick} style={{ width:'490px', height:'490px', cursor:'pointer', filter:'drop-shadow(0 12px 60px rgba(0,0,0,0.5))' }}/>
            </div>
          )}

          {/* Pillar buttons */}
          <div className="anim d5" style={{ marginBottom:'18px', width:'100%' }}>
            {activePillar===null && (
              <div style={{ fontSize:'9px', color:'rgba(6,182,212,0.60)', textTransform:'uppercase', letterSpacing:'0.10em', textAlign:'center', marginBottom:'10px', fontWeight:600 }}>
                &darr; Select a pillar to review the diagnostic
              </div>
            )}
            <div style={{ display:'flex', gap:'6px', justifyContent:'center', flexWrap:'wrap' }}>
              {PILLARS.map((p, i) => (
                <button key={i} onClick={() => activePillar===i ? deselect() : select(i)} style={{
                  padding: m?'8px 11px':'7px 13px', borderRadius:'8px', fontFamily:'inherit',
                  border:`1px solid ${activePillar===i ? 'rgba(6,182,212,0.28)' : 'rgba(255,255,255,0.08)'}`,
                  background: activePillar===i ? 'rgba(6,182,212,0.09)' : 'rgba(8,8,18,0.55)',
                  backdropFilter:'blur(16px)', WebkitBackdropFilter:'blur(16px)',
                  color: activePillar===i ? '#fff' : 'rgba(255,255,255,0.45)',
                  fontSize: m?'10px':'11px', fontWeight:600, cursor:'pointer', transition:'all 0.18s',
                  display:'flex', alignItems:'center', gap:'6px',
                }}>
                  <span style={{ width:'6px', height:'6px', borderRadius:'50%', background:p.color, flexShrink:0 }}/>
                  {p.name}
                </button>
              ))}
            </div>
          </div>

          {/* Detail panel */}
          <div ref={detailRef} style={{ width:'100%' }}>
            {ap ? (
              <div style={{ animation:'fadeInUp 0.35s ease-out' }}>
                {/* Assessment */}
                <div style={{ marginBottom:'14px' }}>
                  <SectionHead n="1" label="Assessment"/>
                  <Card style={{ padding: m?'16px 18px':'20px 24px' }}>
                    <div style={{ display:'flex', gap:'6px', marginBottom:'10px', flexWrap:'wrap' }}>
                      <span style={{ fontSize:'9px', fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', padding:'3px 8px', borderRadius:'4px', background:'rgba(6,182,212,0.10)', color:'#06B6D4', border:'1px solid rgba(6,182,212,0.20)' }}>{ap.stage} &middot; {totalP} deliverables</span>
                      <span style={{ fontSize:'9px', fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', padding:'3px 8px', borderRadius:'4px', background:'rgba(255,255,255,0.04)', color:'rgba(255,255,255,0.40)', border:'1px solid rgba(255,255,255,0.08)' }}>{ap.alignment}</span>
                    </div>
                    <h3 style={{ fontSize: m?'18px':'22px', fontWeight:400, color:'#fff', letterSpacing:'-0.03em', marginBottom:'8px' }}>{ap.name}</h3>
                    <p style={{ fontSize:'12px', color:'rgba(255,255,255,0.55)', lineHeight:1.65, fontWeight:300, marginBottom:'12px' }}>{ap.desc}</p>
                    <div style={{ fontSize:'11.5px', color:'rgba(255,255,255,0.48)', lineHeight:1.65, fontWeight:300, padding:'10px 13px', borderRadius:'8px', background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.06)', marginBottom:'12px' }}>
                      <span style={{ fontSize:'9px', fontWeight:600, color:'#06B6D4', letterSpacing:'0.12em', textTransform:'uppercase', display:'block', marginBottom:'4px' }}>Evidence</span>
                      {ap.evidence}
                    </div>
                    <div style={{ display:'grid', gridTemplateColumns: m?'1fr':'1fr 1fr', gap:'8px' }}>
                      {[
                        {label:'Required Standard', icon:'check', text:ap.strong},
                        {label:'Current Position', icon:'x', text:ap.weak},
                      ].map((row,ri) => (
                        <div key={ri} style={{ padding:'13px 15px', borderRadius:'8px', border:'1px solid rgba(255,255,255,0.07)', background:'rgba(255,255,255,0.02)' }}>
                          <div style={{ fontSize:'9px', fontWeight:600, letterSpacing:'0.12em', textTransform:'uppercase', color:'rgba(255,255,255,0.40)', marginBottom:'7px', display:'flex', alignItems:'center', gap:'5px' }}>
                            {row.icon==='check'
                              ? <svg viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,0.35)" strokeWidth="1.5" strokeLinecap="round" style={{width:'10px',height:'10px'}}><polyline points="3 8 7 12 13 4"/></svg>
                              : <svg viewBox="0 0 16 16" fill="none" stroke="rgba(255,255,255,0.35)" strokeWidth="1.5" strokeLinecap="round" style={{width:'10px',height:'10px'}}><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>
                            }
                            {row.label}
                          </div>
                          <div style={{ fontSize:'12px', color:'rgba(255,255,255,0.58)', lineHeight:1.60, fontWeight:300 }}>{row.text}</div>
                        </div>
                      ))}
                    </div>
                  </Card>
                </div>

                {/* Scope */}
                <div style={{ marginBottom:'14px' }}>
                  <SectionHead n="2" label="Transformation Scope"/>
                  <div style={{ display:'flex', flexDirection:'column', gap:'6px' }}>
                    {ap.subs.map((s, si) => (
                      <div key={si}>
                        <button onClick={() => setActiveSub(activeSub===si ? null : si)} style={{
                          width:'100%', padding: m?'12px 14px':'14px 18px',
                          borderRadius: activeSub===si ? '10px 10px 0 0' : '10px',
                          fontFamily:'inherit', textAlign:'left',
                          border:`1px solid ${activeSub===si ? 'rgba(6,182,212,0.22)' : 'rgba(255,255,255,0.08)'}`,
                          borderBottom: activeSub===si ? '1px solid rgba(6,182,212,0.10)' : undefined,
                          background:'rgba(8,8,18,0.55)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)',
                          cursor:'pointer', transition:'all 0.18s', display:'flex', alignItems:'center', gap:'11px',
                        }}>
                          <span style={{ width:'7px', height:'7px', borderRadius:'50%', background: activeSub===si ? '#06B6D4' : 'rgba(255,255,255,0.20)', flexShrink:0, transition:'background 0.2s' }}/>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize: m?'12px':'13px', fontWeight:600, color: activeSub===si ? '#fff' : 'rgba(255,255,255,0.72)', letterSpacing:'-0.01em' }}>{s.name}</div>
                            <div style={{ fontSize:'10px', color:'rgba(255,255,255,0.28)', marginTop:'2px' }}>{s.items.length} deliverables</div>
                          </div>
                          <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.26)" strokeWidth="2" strokeLinecap="round" style={{ width:'14px', height:'14px', flexShrink:0, transition:'transform 0.18s', transform: activeSub===si ? 'rotate(180deg)' : 'none' }}><path d="M6 9l6 6 6-6"/></svg>
                        </button>
                        {activeSub===si && (
                          <div style={{ padding: m?'11px 14px 15px':'13px 18px 17px', borderRadius:'0 0 10px 10px', border:'1px solid rgba(6,182,212,0.22)', borderTop:'none', background:'rgba(6,182,212,0.04)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)', animation:'fadeInUp 0.20s ease-out' }}>
                            <div style={{ display:'grid', gridTemplateColumns: m?'1fr':'repeat(auto-fill,minmax(188px,1fr))', gap:'5px' }}>
                              {s.items.map((item, ii) => (
                                <div key={ii} style={{ display:'flex', alignItems:'center', gap:'8px', padding:'7px 10px', borderRadius:'6px', background:'rgba(255,255,255,0.025)', border:'1px solid rgba(255,255,255,0.06)' }}>
                                  <span style={{ width:'3px', height:'3px', borderRadius:'50%', background:'rgba(6,182,212,0.65)', flexShrink:0 }}/>
                                  <span style={{ fontSize:'11px', color:'rgba(255,255,255,0.52)', lineHeight:1.4, fontWeight:300 }}>{item}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>

                {/* Questions */}
                <div style={{ marginBottom:'20px' }}>
                  <SectionHead n="3" label="Diagnostic Questions"/>
                  <Card style={{ padding: m?'14px 16px':'18px 22px' }}>
                    {ap.questions.map((q, qi) => (
                      <div key={qi} style={{ display:'flex', gap:'11px', alignItems:'flex-start', fontSize:'12px', color:'rgba(255,255,255,0.52)', lineHeight:1.62, fontWeight:300, padding:'8px 0', borderBottom: qi<ap.questions.length-1 ? '1px solid rgba(255,255,255,0.06)' : 'none' }}>
                        <span style={{ color:'#06B6D4', fontWeight:700, fontSize:'11px', flexShrink:0, marginTop:'1px' }}>?</span>
                        {q}
                      </div>
                    ))}
                  </Card>
                </div>

                <div style={{ textAlign:'center' }}>
                  <button onClick={() => goTo(activePillar+2)} style={{ padding:'9px 20px', borderRadius:'8px', border:'1px solid rgba(6,182,212,0.25)', background:'rgba(6,182,212,0.07)', backdropFilter:'blur(16px)', WebkitBackdropFilter:'blur(16px)', color:'#06B6D4', fontSize:'11px', fontWeight:600, cursor:'pointer', fontFamily:'inherit', transition:'all 0.2s' }}>
                    Full {ap.name} diagnostic &rarr;
                  </button>
                </div>
              </div>
            ) : (
              <Card style={{ textAlign:'center', padding: m?'28px 18px':'36px 28px', border:'1px dashed rgba(6,182,212,0.15)', background:'rgba(6,182,212,0.03)' }}>
                <Eyebrow style={{ textAlign:'center', marginBottom:'10px' }}>Berkeley Brand Diagnostic</Eyebrow>
                <div style={{ fontSize: m?'14px':'16px', color:'#fff', marginBottom:'8px', fontWeight:400 }}>
                  Select any pillar above to review the diagnostic
                </div>
                <div style={{ fontSize:'12px', color:'rgba(255,255,255,0.45)', lineHeight:1.62, maxWidth:'400px', margin:'0 auto', fontWeight:300 }}>
                  Each pillar contains Pivitt's assessment of Berkeley's current brand alignment: current position, required standard, and the full scope of transformation work.
                </div>
                <div style={{ display:'flex', justifyContent:'center', gap:'24px', marginTop:'20px' }}>
                  {[{n:'6',l:'Pillars'},{n:String(total),l:'Deliverables'},{n:'3',l:'Sections each'}].map((s,i) => (
                    <div key={i} style={{ textAlign:'center' }}>
                      <div style={{ fontSize: m?'20px':'24px', fontWeight:280, color:'#06B6D4', letterSpacing:'-0.04em' }}>{s.n}</div>
                      <div style={{ fontSize:'9px', color:'rgba(255,255,255,0.32)', letterSpacing:'0.05em', textTransform:'uppercase' }}>{s.l}</div>
                    </div>
                  ))}
                </div>
              </Card>
            )}
          </div>
        </Slide>
      );
    };

    /* ─────────────── MAIN APP ─────────────── */
    const App = () => {
      const m = useIsMobile();
      const [slide, setSlide] = useState(0);
      const [ready, setReady] = useState(false);
      const tx = useRef(null), ty = useRef(null);

      useEffect(() => { setTimeout(() => setReady(true), 3300); }, []);

      const total = 9; // 0=cover, 1=overview, 2-7=pillars, 8=360
      const goTo = useCallback((i) => setSlide(Math.max(0, Math.min(i, total-1))), []);
      const prev = () => setSlide(s => Math.max(0, s-1));
      const next = () => setSlide(s => Math.min(total-1, s+1));

      useEffect(() => {
        const k = (e) => {
          if (e.key==='ArrowRight'||e.key==='ArrowDown') next();
          if (e.key==='ArrowLeft'||e.key==='ArrowUp') prev();
        };
        window.addEventListener('keydown', k);
        return () => window.removeEventListener('keydown', k);
      }, []);

      const onTouchStart = (e) => { tx.current=e.touches[0].clientX; ty.current=e.touches[0].clientY; };
      const onTouchEnd   = (e) => {
        if (!tx.current) return;
        const dx=tx.current-e.changedTouches[0].clientX, dy=ty.current-e.changedTouches[0].clientY;
        if (Math.abs(dx)>Math.abs(dy) && Math.abs(dx)>42) { dx>0 ? next() : prev(); }
        tx.current=null;
      };

      const slides = useMemo(() => [
        <CoverSlide key="c" goTo={goTo}/>,
        <OverviewSlide key="o" goTo={goTo}/>,
        ...PILLARS.map((p,i) => <PillarSlide key={p.id} pillarIdx={i} goTo={goTo}/>),
        <Model360Slide key="m" goTo={goTo}/>,
      ], [m]);

      if (!ready) return <div style={{height:'100vh',width:'100vw',background:'#06060C'}}/>;

      return (
        <div style={{ height:'100vh', width:'100vw', overflow:'hidden', position:'relative', background:'#06060C' }}
          onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>

          <Ambient/>

          {/* ── TOP BAR ── */}
          <div style={{
            position:'fixed', top:0, left:0, right:0, zIndex:1000,
            padding: m?'10px 12px':'12px 14px',
            display:'flex', justifyContent:'center', pointerEvents:'none',
          }}>
            <div style={{
              width:'min(1080px,96vw)',
              display:'flex', alignItems:'center', justifyContent:'space-between',
              padding: m?'9px 12px':'10px 14px',
              borderRadius:'999px',
              border:'1px solid rgba(255,255,255,0.09)',
              background:'rgba(6,6,12,0.72)',
              backdropFilter:'blur(24px) saturate(1.3)',
              WebkitBackdropFilter:'blur(24px) saturate(1.3)',
              boxShadow:'0 8px 40px rgba(0,0,0,0.36)',
              pointerEvents:'auto', gap:'12px',
            }}>
              <div style={{ display:'flex', alignItems:'center', gap:'10px', minWidth:0 }}>
                <span style={{ fontSize:'11px', fontWeight:800, letterSpacing:'0.24em', textTransform:'uppercase', color:'rgba(255,255,255,0.88)', whiteSpace:'nowrap' }}>PIVITT</span>
                <span style={{ width:'1px', height:'12px', background:'rgba(255,255,255,0.10)', flexShrink:0 }}/>
                <span style={{ fontSize:'10px', fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', color:'rgba(255,255,255,0.30)', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                  {m ? 'Berkeley Diagnostic' : 'The Berkeley Partnership · Brand Diagnostic'}
                </span>
              </div>
              <div style={{ fontSize:'10px', color:'rgba(255,255,255,0.28)', border:'1px solid rgba(255,255,255,0.09)', background:'rgba(255,255,255,0.02)', padding:'5px 10px', borderRadius:'999px', letterSpacing:'0.06em', flexShrink:0, backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)' }}>
                {slide+1} / {total}
              </div>
            </div>
          </div>

          {/* ── SLIDES ── */}
          <div style={{ height:'100%', width:'100%', position:'relative' }}>
            {slides.map((sl, idx) => (
              <div key={idx} style={{
                position:'absolute', top:0, left:0, width:'100%', height:'100%',
                opacity: slide===idx ? 1 : 0,
                transform: slide===idx ? 'translateY(0) scale(1)' : 'translateY(6px) scale(0.99)',
                transition: 'opacity 0.45s var(--ease), transform 0.45s var(--ease)',
                pointerEvents: slide===idx ? 'auto' : 'none',
              }}>
                {sl}
              </div>
            ))}
          </div>

          {/* ── BOTTOM NAV ──
               Uses padding:0 and fixed height so it never grows and overlaps content.
               Content slides have 156px bottom padding to clear this.
          */}
          <div style={{
            position:'fixed', bottom:'20px', left:'50%', transform:'translateX(-50%)',
            display:'flex', alignItems:'center', gap: m?'10px':'14px',
            padding: m?'9px 16px':'11px 24px',
            borderRadius:'20px',
            border:'1px solid rgba(255,255,255,0.09)',
            background:'rgba(6,6,12,0.80)',
            backdropFilter:'blur(32px) saturate(1.4)',
            WebkitBackdropFilter:'blur(32px) saturate(1.4)',
            boxShadow:'0 8px 48px rgba(0,0,0,0.50)',
            zIndex:1000,
          }}>
            {/* Prev */}
            <button onClick={prev} disabled={slide===0} style={{
              width: m?'30px':'34px', height: m?'30px':'34px', borderRadius:'50%',
              border:'1px solid rgba(255,255,255,0.09)', background:'rgba(255,255,255,0.03)',
              backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)',
              color:'#fff', cursor: slide===0 ? 'not-allowed' : 'pointer',
              display:'flex', alignItems:'center', justifyContent:'center',
              opacity: slide===0 ? 0.25 : 0.75, transition:'opacity 0.2s', fontFamily:'inherit',
            }}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{width:'13px',height:'13px'}}><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>

            {/* Dots */}
            <div style={{ display:'flex', gap: m?'5px':'6px', alignItems:'center' }}>
              {Array.from({length: total}, (_,i) => (
                <button key={i} onClick={() => goTo(i)} style={{
                  width: slide===i ? (m?'18px':'22px') : '5px',
                  height:'5px', borderRadius:'999px', border:'none', padding:0,
                  background: slide===i ? '#06B6D4' : 'rgba(255,255,255,0.18)',
                  cursor:'pointer', transition:'all 0.25s var(--ease)',
                }}/>
              ))}
            </div>

            {/* Next */}
            <button onClick={next} disabled={slide===total-1} style={{
              width: m?'30px':'34px', height: m?'30px':'34px', borderRadius:'50%',
              border:'1px solid rgba(255,255,255,0.09)', background:'rgba(255,255,255,0.03)',
              backdropFilter:'blur(12px)', WebkitBackdropFilter:'blur(12px)',
              color:'#fff', cursor: slide===total-1 ? 'not-allowed' : 'pointer',
              display:'flex', alignItems:'center', justifyContent:'center',
              opacity: slide===total-1 ? 0.25 : 0.75, transition:'opacity 0.2s', fontFamily:'inherit',
            }}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{width:'13px',height:'13px'}}><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </div>

          {/* Confidentiality */}
          {slide > 0 && (
            <div style={{ position:'fixed', bottom:'6px', left:'50%', transform:'translateX(-50%)', fontSize:'8px', color:'rgba(255,255,255,0.09)', letterSpacing:'0.06em', whiteSpace:'nowrap', zIndex:999 }}>
              Confidential &middot; The Berkeley Partnership &middot; &copy; 2026 Pivitt
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App/>, document.getElementById('root'));
  </script>
</body>
</html>
