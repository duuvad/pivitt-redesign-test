<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Invest in Kazakhstan · National Investment Brand Programme | Pivitt</title>
  <meta name="description" content="Invest in Kazakhstan: National Investment Brand Programme. Prepared by Pivitt for the Republic of Kazakhstan in partnership with Optima.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  
  <style>
    :root {
      --bg: #06060C;
      --bg2: #0a0a14;
      --card: rgba(255,255,255,0.025);
      --cardH: rgba(255,255,255,0.05);
      --bdr: rgba(255,255,255,0.07);
      --bdrH: rgba(255,255,255,0.14);
      --t1: #fff;
      --t2: rgba(255,255,255,0.6);
      --t3: rgba(255,255,255,0.38);
      --blue: #3B82F6;
      --purple: #8B5CF6;
      --cyan: #06B6D4;
      --green: #10B981;
      --amber: #F59E0B;
      --pink: #EC4899;
      --red: #EF4444;
      --gold: #D4A574;
      --sage: #7C9A72;
      --r: 14px;
      --ease: cubic-bezier(0.4,0,0.2,1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; overflow: hidden; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter Tight', sans-serif;
      background: var(--bg);
      color: var(--t1);
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: rgba(139,92,246,0.3); }

    /* Intro Screen */
    #intro {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter Tight', sans-serif;
      background: #06060C;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #intro.fade-out { opacity: 0; pointer-events: none; }
    .intro-content {
      position: relative; z-index: 2;
      text-align: center; padding: 40px;
      display: flex; flex-direction: column; align-items: center;
    }
    .intro-line {
      width: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,165,116,0.6), rgba(124,154,114,0.4), transparent);
      margin-bottom: 32px;
      animation: introLineExpand 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
    }
    @keyframes introLineExpand { to { width: 120px; } }
    .intro-logo {
      height: 44px; display: block; margin: 0 auto;
      opacity: 0; transform: translateY(14px) scale(0.96);
      animation: introLogoIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.45s forwards, introLogoPulse 2.6s ease-in-out 1.6s infinite;
    }
    @keyframes introLogoIn { to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes introLogoPulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.35); } }
    .intro-brand {
      font-size: 13px; font-weight: 700; letter-spacing: 0.35em;
      color: rgba(255,255,255,0); display: flex; gap: 4px;
    }
    .intro-brand span {
      animation: introLetterIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0; transform: translateY(8px);
    }
    @keyframes introLetterIn { to { opacity: 1; transform: translateY(0); color: rgba(255,255,255,0.9); } }
    .intro-divider {
      width: 24px; height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 20px 0;
      opacity: 0;
      animation: introFadeIn 0.6s ease 1.2s forwards;
    }
    .intro-prepared {
      font-size: 11px; letter-spacing: 0.08em;
      color: rgba(255,255,255,0);
      text-transform: uppercase;
      animation: introFadeIn 0.6s ease 1.4s forwards;
    }
    .intro-client {
      font-size: 17px; font-weight: 500;
      color: rgba(255,255,255,0);
      letter-spacing: -0.01em; margin-top: 6px;
      animation: introFadeIn 0.6s ease 1.6s forwards;
    }
    @keyframes introFadeIn { to { color: rgba(255,255,255,0.45); opacity: 1; } }
    .intro-pulse {
      position: absolute; top: 50%; left: 50%;
      width: 200px; height: 200px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,165,116,0.06) 0%, transparent 70%);
      animation: introPulse 2.5s ease-in-out infinite;
    }
    @keyframes introPulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }
    .intro-dots {
      position: absolute; inset: 0; overflow: hidden; opacity: 0.3;
    }
    .intro-dot {
      position: absolute; width: 1px; height: 1px;
      background: rgba(255,255,255,0.4); border-radius: 50%;
      animation: introDotFloat linear infinite;
    }
    @keyframes introDotFloat {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
    }
    @keyframes floatX {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(6px); }
    }
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(139,92,246,0.15); box-shadow: 0 0 20px rgba(139,92,246,0.05); }
      50% { border-color: rgba(34,211,238,0.2); box-shadow: 0 0 30px rgba(34,211,238,0.08); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    ::-webkit-scrollbar { width: 3px; height: 0px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 2px; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(32px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @supports (bottom: env(safe-area-inset-bottom)) {
      .bottom-nav { bottom: max(24px, env(safe-area-inset-bottom)) !important; }
    .kcard:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.22) !important; }
    .flow-node { transition: filter 0.25s ease; }
    .flow-node:hover { filter: brightness(1.45); }
    .chip-row { transition: transform 0.25s ease, border-color 0.25s ease; }
    .chip-row:hover { transform: translateX(4px); }
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes orbA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(100px,80px); } }
    @keyframes orbB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-80px,-60px); } }
    @keyframes gradFlow { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes countUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes ringPulse { 0%,100% { opacity: 0.15; transform: scale(1); } 50% { opacity: 0.25; transform: scale(1.02); } }

    .animate-in { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
    .delay-1 { animation-delay: 0.08s; opacity: 0; }
    .delay-2 { animation-delay: 0.16s; opacity: 0; }
    .delay-3 { animation-delay: 0.24s; opacity: 0; }
    .delay-4 { animation-delay: 0.32s; opacity: 0; }
    .delay-5 { animation-delay: 0.40s; opacity: 0; }
    .delay-6 { animation-delay: 0.48s; opacity: 0; }
    .delay-7 { animation-delay: 0.56s; opacity: 0; }
    .delay-8 { animation-delay: 0.64s; opacity: 0; }
    .slide-stage > * { opacity: 0; animation: slideUp 0.75s cubic-bezier(0.16,1,0.3,1) forwards; animation-play-state: paused; }
    .chapter.in-view .slide-stage > * { animation-play-state: running; }
    .chapter.in-view .animate-in { animation-play-state: running; }
    .chapter .animate-in { animation-play-state: paused; }
    .slide-stage > *:nth-child(1) { animation-delay: 0.05s; }
    .slide-stage > *:nth-child(2) { animation-delay: 0.24s; }
    .slide-stage > *:nth-child(3) { animation-delay: 0.46s; }
    .slide-stage > *:nth-child(4) { animation-delay: 0.68s; }
    .slide-stage > *:nth-child(n+5) { animation-delay: 0.88s; }
    @media (prefers-reduced-motion: reduce) { .slide-stage > * { animation: none; opacity: 1; } }

    /* Callout micro-interactions (subtle, editorial) */
    .callout {
      transition: transform 260ms var(--ease), border-color 260ms var(--ease), background 260ms var(--ease), box-shadow 260ms var(--ease);
      will-change: transform;
    }
    @media (hover:hover) {
      .callout:hover {
        transform: translateY(-3px);
        border-color: rgba(255,255,255,0.22);
        background: rgba(6,6,12,0.40);
        box-shadow: 0 18px 70px rgba(0,0,0,0.46);
      }
    }


    .hide-mobile { display: none; }
    .lockup-desktop { display: none; }
    @media (min-width: 768px) { .lockup-desktop { display: flex; } }
    @media (min-width: 768px) { .hide-mobile { display: block; } .show-mobile { display: none; } }
    @media print { .no-print { display: none !important; } body { background: var(--bg); } }
  </style>
</head>

            <div style={{ position: 'relative', zIndex: 2, maxWidth: '720px' }}>
              <div style={{
                width: '70px', height: '2px', margin: '0 auto 32px',
                background: 'linear-gradient(90deg, var(--cyan), var(--blue), var(--gold))', borderRadius: '2px',

                  display: 'inline-flex', alignItems: 'center', gap: '8px',

                }}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="var(--blue)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ width: '16px', height: '16px', flexShrink: 0 }}><rect x="2" y="4" width="20" height="16" rx="2" /><path d="M22 4l-10 8L2 4" /></svg>

                  textDecoration: 'none', fontWeight: 500,
                }}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ width: '16px', height: '16px', flexShrink: 0 }}><circle cx="12" cy="12" r="10" /><path d="M2 12h20M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z" /></svg>
                  www.pivitt.co.uk
                </a>
              </div>
              <div style={{
                marginTop: '44px', fontSize: '10px', letterSpacing: '0.08em', textTransform: 'uppercase',
                color: 'rgba(255,255,255,0.18)',
                opacity: visible ? 1 : 0, transition: 'opacity 0.8s ease 1.3s',
              }}>Prepared for the Government of the Republic of Kazakhstan · In partnership with Optima</div>
              <div style={{
                position: 'absolute', bottom: isMobile ? '-60px' : '-40px', left: '50%', transform: 'translateX(-50%)',
                fontSize: '9px', color: 'rgba(255,255,255,0.1)', letterSpacing: '0.04em', whiteSpace: 'nowrap',
              }}>© 2026 Pivitt Ltd · All rights reserved · Confidential</div>
            </div>
          </div>
        );
      };

      // ─── RENDER ───
      const slides = useMemo(() => [
        <CoverSlide key="0" />,
        <MandateSlide key="1" />,
        <EngineSlide key="1b" />,
        <MomentSlide key="2" />,
        <EstateSlide key="3" />,
        <PerceptionSlide key="4" />,
        <CompetitionSlide key="5" />,
        <PropositionSlide key="6" />,
        <TheModelSlide key="6b" />,
        <DecaySlide key="6c" />,

        <SectionCoverSlide key="7" num="01" eyebrow="Part One" title="The Entity" subtitle="The standing institution that owns Kazakhstan's investment narrative: its structure, its precedents and the brand architecture it governs." accentA="var(--cyan)" accentB="var(--gold)" />,
        <EntityModelSlide key="8" />,
        <Model360Slide key="8b" />,
        <ImpactSlide key="8c" />,
        <PrecedentSlide key="9" />,
        <BrandArchSlide key="10" />,
        <NarrativeSlide key="11" />,

        <SectionCoverSlide key="12" num="02" eyebrow="Part Two" title="The Campaign" subtitle="The creative territories, the activation programme and the named delivery structure that put the narrative in front of global capital." accentA="var(--purple)" accentB="var(--blue)" />,
        <TerritoriesSlide key="13" />,
        <ProgrammeSlide key="14" />,
        <OrbitalSlide key="14b" />,
        <PartnerSlide key="15" />,

        <SectionCoverSlide key="16" num="03" eyebrow="Part Three" title="Sport" subtitle="How a major partnership in Formula 1 and European football amplifies the strategy rather than sitting apart from it, with the market as it actually stands in 2026." accentA="var(--gold)" accentB="var(--cyan)" />,

        <RoadmapSlide key="21" />,

        <ProjectionsSlide key="22" />,
        <AsymmetrySlide key="22b" />,
        <GovernanceSlide key="23" />,
        <InvestmentSlide key="24" />,

        <WhyPivittSlide key="25" />,
        <NextStepsSlide key="26" />,
        <ClosingSlide key="27" />,
      ], [isMobile]);

        <div style={{ height: '100vh', width: '100%', overflow: 'hidden', position: 'relative', background: 'var(--bg)' }}>

              pointerEvents: 'auto',

                <div style={{
                  fontSize: '11px', fontWeight: 800, letterSpacing: '0.24em', textTransform: 'uppercase',

                <div style={{ width: '1px', height: '14px', background: 'rgba(255,255,255,0.10)' }} />
                <div style={{
                  fontSize: '10px', fontWeight: 650, letterSpacing: '0.18em', textTransform: 'uppercase',
                  color: 'rgba(255,255,255,0.35)',
                  whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',

                  Invest in Kazakhstan · National Investment Brand Programme

              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: '12px', flex: '0 0 auto' }}>
                <button onClick={() => setMenuOpen(!menuOpen)} style={{
                  display: 'flex', alignItems: 'center', gap: '7px', cursor: 'pointer',
                  border: '1px solid var(--bdr)', background: 'var(--card)', borderRadius: '16px',
                  padding: '7px 14px', color: 'rgba(255,255,255,0.8)', fontSize: '10px', fontWeight: 600,
                  letterSpacing: '0.12em', fontFamily: 'inherit', transition: 'all 0.25s',

                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="15" y2="18"/></svg>
                  <span className="hide-mobile">CHAPTERS</span>
                </button>
                <div className="lockup-desktop" style={{ alignItems: 'center', gap: '8px' }}>
                  <span style={{ fontSize: '8.5px', fontWeight: 600, letterSpacing: '0.16em', color: 'rgba(255,255,255,0.30)', textTransform: 'uppercase' }}>In partnership with</span>
                  <span style={{ fontSize: '11px', fontWeight: 700, letterSpacing: '0.26em', color: 'rgba(255,255,255,0.85)' }}>OPTIMA</span>
                </div>
                <div style={{
                  fontSize: '10px', color: 'rgba(255,255,255,0.35)',
                  border: '1px solid rgba(255,255,255,0.10)',
                  background: 'rgba(255,255,255,0.02)',
                  padding: '6px 10px',
                  borderRadius: '999px',
                  letterSpacing: '0.08em',
                }}>
                  {currentSlide + 1}/{slides.length}
                </div>
              </div>
            </div>
          </div>

          {menuOpen && (
            <div onClick={() => setMenuOpen(false)} style={{ position: 'fixed', inset: 0, zIndex: 290, background: 'rgba(6,6,12,0.5)', backdropFilter: 'blur(4px)' }}>
              <div onClick={(e) => e.stopPropagation()} style={{
                position: 'absolute', top: '74px', right: isMobile ? '12px' : '40px',
                width: isMobile ? 'calc(100% - 24px)' : '300px', borderRadius: '18px',
                border: '1px solid rgba(255,255,255,0.12)', background: 'rgba(10,10,18,0.96)',
                backdropFilter: 'blur(30px)', padding: '12px', animation: 'slideUp 0.35s cubic-bezier(0.16,1,0.3,1) both',
              }}>
                {MENU_ITEMS.map(([label, key], i) => (
                  <button key={i} onClick={() => scrollToKey(key)} className="chip-row" style={{
                    display: 'flex', alignItems: 'center', gap: '12px', width: '100%', textAlign: 'left',
                    background: 'transparent', border: 'none', borderRadius: '10px', cursor: 'pointer',
                    padding: '10px 12px', color: 'rgba(255,255,255,0.78)', fontSize: '13px', fontFamily: 'inherit',
                  }}>
                    <span style={{ fontSize: '9px', color: 'var(--gold)', fontWeight: 600, width: '18px' }}>{String(i + 1).padStart(2, '0')}</span>
                    {label}
                  </button>
                ))}
              </div>
            </div>
          )}

          <div style={{ height: '100%', width: '100%', position: 'relative' }}>
            {slides.map((slide, index) => (
              <section key={index} className={'chapter' + (currentSlide === index ? ' in-view' : '')} data-chapter={index} style={{
                position: 'absolute', top: 0, left: 0, width: '100%', height: '100%',
                opacity: currentSlide === index ? 1 : 0,
                transform: currentSlide === index ? 'scale(1)' : 'scale(0.985)',
                transition: 'opacity 0.5s ease, transform 0.5s ease',
                pointerEvents: currentSlide === index ? 'auto' : 'none',
                overflowX: 'hidden', overflowY: 'auto', WebkitOverflowScrolling: 'touch',
              }}>
                {slide}
              </section>
            ))}
          </div>

          <div className="no-print bottom-nav" style={{
            position: 'fixed', 
            bottom: isMobile ? '24px' : '28px', 
            left: '50%', transform: 'translateX(-50%)',
            display: 'flex', alignItems: 'center', gap: isMobile ? '10px' : '16px',
            padding: isMobile ? '10px 16px' : '14px 28px',
            borderRadius: '20px',
            border: '1px solid rgba(255,255,255,0.1)',
            background: 'rgba(6,6,12,0.75)',

            zIndex: 1000,
          }}>
            <button style={{
              width: isMobile ? '32px' : '38px', height: isMobile ? '32px' : '38px', borderRadius: '50%',
              border: '1px solid var(--bdr)', background: 'var(--card)', color: '#fff',
              cursor: currentSlide === 0 ? 'not-allowed' : 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: isMobile ? '12px' : '14px', opacity: currentSlide === 0 ? 0.3 : 1,
              transition: 'all 0.2s', fontFamily: 'inherit',
            }} onClick={prevSlide} disabled={currentSlide === 0}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{width:'14px',height:'14px'}}><path d="M19 12H5M12 19l-7-7 7-7"/></svg></button>

            <div
              style={{
                position: 'relative',
                display: 'flex',
                maxWidth: isMobile ? '160px' : 'unset',
                overflow: isMobile ? 'hidden' : 'visible',
                padding: isMobile ? '2px 2px' : 0,
                WebkitMaskImage: isMobile
                  ? 'linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%)'
                  : 'none',
                maskImage: isMobile
                  ? 'linear-gradient(90deg, transparent 0%, #000 12%, #000 88%, transparent 100%)'
                  : 'none',
              }}
            >
              {(() => {
                // Mobile: show a moving window of dots so pagination never hits the screen edge.
                const maxDots = isMobile ? 9 : slides.length;
                const half = Math.floor(maxDots / 2);
                const start = isMobile
                  ? Math.max(0, Math.min(currentSlide - half, slides.length - maxDots))
                  : 0;
                const end = isMobile ? Math.min(slides.length, start + maxDots) : slides.length;
                const indices = [];
                for (let i = start; i < end; i++) indices.push(i);

                // Optional "more" hints at edges (subtle, still clickable).
                const showLeftMore = isMobile && start > 0;
                const showRightMore = isMobile && end < slides.length;

                return (
                  <div style={{ display: 'flex', gap: isMobile ? '3px' : '5px', alignItems: 'center' }}>
                    {showLeftMore ? (
                      <div
                        key="more-left"
                        title="Earlier slides"
                        style={{
                          width: '5px',
                          height: '5px',
                          borderRadius: '3px',
                          background: 'rgba(255,255,255,0.10)',
                          cursor: 'pointer',
                          transition: 'all 0.3s',
                        }}
                        onClick={() => goToSlide(Math.max(0, start - half))}
                      />
                    ) : null}

                    {indices.map((i) => (
                      <div
                        key={i}
                        style={{
                          width: currentSlide === i ? (isMobile ? '14px' : '20px') : (isMobile ? '5px' : '6px'),
                          height: isMobile ? '5px' : '6px',
                          borderRadius: '3px',
                          background:
                            currentSlide === i
                              ? 'linear-gradient(135deg, var(--blue), var(--purple))'
                              : 'rgba(255,255,255,0.15)',
                          cursor: 'pointer',
                          transition: 'all 0.3s',
                        }}
                        onClick={() => goToSlide(i)}
                      />
                    ))}

                    {showRightMore ? (
                      <div
                        key="more-right"
                        title="Later slides"
                        style={{
                          width: '5px',
                          height: '5px',
                          borderRadius: '3px',
                          background: 'rgba(255,255,255,0.10)',
                          cursor: 'pointer',
                          transition: 'all 0.3s',
                        }}
                        onClick={() => goToSlide(Math.min(slides.length - 1, end + half - 1))}
                      />
                    ) : null}
                  </div>
                );
              })()}
            </div>

            <span style={{ fontSize: isMobile ? '10px' : '11px', color: 'var(--t3)', minWidth: isMobile ? '36px' : '44px', textAlign: 'center' }}>
              {currentSlide + 1}/{slides.length}
            </span>

            <button style={{
              width: isMobile ? '32px' : '38px', height: isMobile ? '32px' : '38px', borderRadius: '50%',
              border: '1px solid var(--bdr)', background: 'var(--card)', color: '#fff',
              cursor: currentSlide === (slides.length - 1) ? 'not-allowed' : 'pointer',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: isMobile ? '12px' : '14px', opacity: currentSlide === (slides.length - 1) ? 0.3 : 1,
              transition: 'all 0.2s', fontFamily: 'inherit',
            }} onClick={nextSlide} disabled={currentSlide === (slides.length - 1)}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{width:'14px',height:'14px'}}><path d="M5 12h14M12 5l7 7-7 7"/></svg></button>
          </div>
        </div>
      );
    };

    ReactDOM.render(<KZPresentation />, document.getElementById('root'));
  </script>
